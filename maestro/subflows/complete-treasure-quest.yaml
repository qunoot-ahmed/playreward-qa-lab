appId: com.qunoot.playreward
---
# Assumes Treasure Quest is already open on an active attempt.
# Completes Levels 1–5 by collecting the required treasures (1+2+3+4+5).

# Complete Level 1
- extendedWaitUntil:
    visible:
      id: treasure-target
    timeout: 5000
- tapOn:
    id: treasure-target

# Complete Level 2
- extendedWaitUntil:
    visible:
      id: treasure-target
    timeout: 5000
- tapOn:
    id: treasure-target
- tapOn:
    id: treasure-target

# Complete Level 3
- extendedWaitUntil:
    visible:
      id: treasure-target
    timeout: 5000
- tapOn:
    id: treasure-target
- tapOn:
    id: treasure-target
- tapOn:
    id: treasure-target

# Complete Level 4
- extendedWaitUntil:
    visible:
      id: treasure-target
    timeout: 5000
- tapOn:
    id: treasure-target
- tapOn:
    id: treasure-target
- tapOn:
    id: treasure-target
- tapOn:
    id: treasure-target

# Complete Level 5
- extendedWaitUntil:
    visible:
      id: treasure-target
    timeout: 5000
- tapOn:
    id: treasure-target
- tapOn:
    id: treasure-target
- tapOn:
    id: treasure-target
- tapOn:
    id: treasure-target
- tapOn:
    id: treasure-target
