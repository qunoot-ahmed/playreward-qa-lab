<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Offer Details</title>
<link rel="stylesheet" href="screen.css"/>
</head><body class="capture">
<section class="phone" id="screen">
  <div class="back">← Back</div>
  <h2 class="title">Offer Details</h2>
  <div class="card">
    <div class="label">Game</div><div class="value">Treasure Quest</div>
    <div class="label">Offer</div>
    <p class="offer" style="font-size:16px">Complete Treasure Quest Level 5 within 7 days and earn 500 coins.</p>
    <div class="label">Reward</div><div class="value">500 coins</div>
    <div class="label">Requirement</div><div class="value">Complete Level 5 within 7 days</div>
    <div class="label">Status</div><span class="badge badge-active">Active</span>
    <div class="label">Current level</div><div class="value">Level 1 unlocked</div>
    <div>
      <div class="progress-label">Completed levels</div>
      <div class="track"><div class="fill" style="width:0%"></div></div>
      <div><strong>0/5</strong></div>
    </div>
    <div class="btn btn-primary">Continue Playing</div>
  </div>
</section>
</body></html>
