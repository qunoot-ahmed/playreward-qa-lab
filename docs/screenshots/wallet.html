<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Wallet</title>
<link rel="stylesheet" href="screen.css"/>
</head><body class="capture">
<section class="phone" id="screen">
  <div class="back">← Back</div>
  <h2 class="title">Wallet</h2>
  <div class="nav">
    <div class="btn btn-ghost">Offers</div>
    <div class="btn btn-secondary">Wallet</div>
    <div class="btn btn-ghost">QA Tools</div>
  </div>
  <div class="card" style="border-color:var(--brand)">
    <div class="label">Total coin balance</div>
    <div class="balance">500 coins</div>
  </div>
  <h3 style="margin:12px 0 8px;font-size:16px">Reward transaction history</h3>
  <div class="card">
    <div class="game">Treasure Quest</div>
    <div class="value" style="font-size:14px">Complete Treasure Quest Level 5 within 7 days and earn 500 coins.</div>
    <div class="tx-amount">+500 coins</div>
    <div class="tag">Status: granted</div>
  </div>
</section>
</body></html>
