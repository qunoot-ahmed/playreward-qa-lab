<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Offers</title>
<link rel="stylesheet" href="screen.css"/>
</head><body class="capture">
<section class="phone" id="screen">
  <div class="row">
    <div>
      <p class="brand">PlayReward</p>
      <p class="tag">Rewarded gaming QA lab</p>
    </div>
    <div class="chip"><span>Wallet</span><strong>0 coins</strong></div>
  </div>
  <div class="nav">
    <div class="btn btn-secondary">Offers</div>
    <div class="btn btn-ghost">Wallet</div>
    <div class="btn btn-ghost">QA Tools</div>
  </div>
  <div class="card">
    <div class="game">Treasure Quest</div>
    <p class="offer">Complete Treasure Quest Level 5 within 7 days and earn 500 coins.</p>
    <div class="meta">
      <div>Reward: 500 coins</div>
      <div>Target: Level 5</div>
      <div>Deadline: 7 days</div>
    </div>
    <span class="badge">Not started</span>
    <div>
      <div class="progress-label">Completed levels</div>
      <div class="track"><div class="fill" style="width:0%"></div></div>
      <div><strong>0/5</strong></div>
    </div>
    <div class="btn btn-primary">View Details</div>
  </div>
</section>
</body></html>
