<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>QA Tools</title>
<link rel="stylesheet" href="screen.css"/>
</head><body class="capture">
<section class="phone" id="screen">
  <div class="back">← Back</div>
  <h2 class="title">QA Tools</h2>
  <div class="notice notice-warn">
    <strong>Test-only area</strong>
    <div class="tag" style="margin:0;color:#fde68a">Not part of the player journey.</div>
  </div>
  <div class="card" style="margin-top:12px">
    <strong>Reset Test Data</strong>
    <div class="tag" style="margin:0">Clears local offer progress, wallet, and history.</div>
    <div class="btn btn-danger">Reset Test Data</div>
  </div>
  <div class="card" style="margin-top:12px">
    <strong>Simulate Offer Expiry</strong>
    <div class="tag" style="margin:0">Rewrites offer start &gt;7 days past, then evaluates normally.</div>
    <div class="btn btn-danger">Simulate Offer Expiry</div>
  </div>
</section>
</body></html>
